name: Feature request
description: Propose a scoped RelayForge improvement.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Security and compatibility impact
      description: Cover auth, privacy, routing, local-first behavior, and the zero-dependency contract.
    validations:
      required: true
