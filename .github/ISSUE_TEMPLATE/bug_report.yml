name: Bug report
description: Report a reproducible RelayForge problem using redacted diagnostics.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never paste full API keys, RELAY_TOKEN, cookies, Authorization headers, prompts, or private upstream bodies.
  - type: textarea
    id: summary
    attributes:
      label: Problem
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include redacted commands and the first relevant error.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Prefer `npm.cmd run doctor:sum` and review it before posting.
