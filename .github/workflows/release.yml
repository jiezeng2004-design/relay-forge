name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Read-only check
        run: npm run check

      - name: Pre-release (strict)
        run: npm run pre-release:ci

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
        env:
          OPENRELAY_TEST_ALLOW_SHORT_IDLE_TIMEOUT: "true"

      - name: Doctor (redacted diagnostic)
        run: npm run doctor

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Build distribution zip
        run: npm run build-dist

      - name: Resolve exact release artifacts
        id: artifacts
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"
          echo "zip=relayforge-${version}.zip" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: RelayForge ${{ github.ref_name }}
          body_path: docs/release-${{ github.ref_name }}.md
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.zip }}.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    name: Build & push container to GHCR
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for image tags
        id: meta
        run: |
          ref="${GITHUB_REF_NAME}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          echo "image=ghcr.io/${owner,,}/relayforge" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
