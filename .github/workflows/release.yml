name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 18
          - 20
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Read-only check
        run: npm run check

      - name: Pre-release (strict)
        run: npm run pre-release:ci

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
        env:
          OPENRELAY_TEST_ALLOW_SHORT_IDLE_TIMEOUT: "true"

      - name: Doctor (redacted diagnostic)
        run: npm run doctor

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build distribution zip
        run: npm run build-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RelayForge ${{ github.ref_name }}
          body_path: docs/release-v0.3.1.md
          files: |
            relayforge-*.zip
            relayforge-*.zip.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
