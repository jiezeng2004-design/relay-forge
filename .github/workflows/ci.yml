name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Read-only check
        run: npm run check

      - name: Pre-release (strict)
        run: npm run pre-release:ci

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
        env:
          OPENRELAY_TEST_ALLOW_SHORT_IDLE_TIMEOUT: "true"

      - name: Doctor (redacted diagnostic)
        run: npm run doctor

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan Git history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  gate:
    name: CI gate
    if: always()
    needs: [test, secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Require all checks
        shell: bash
        run: |
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.secrets.result }}" = "success"
